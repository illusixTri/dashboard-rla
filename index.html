<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio Mbak Amel V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-200 font-sans antialiased p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex items-center justify-between border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">📈 Portofolio Mbak Amel V2</h1>
                <p class="text-gray-400 mt-1">Live Trading Tracker & Performance Analytics</p>
            </div>
            <div class="text-right">
                <p class="text-green-400 font-semibold flex items-center justify-end">
                    <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span> SYSTEM ONLINE
                </p>
            </div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-md">
                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">Winrate (Closed)</p>
                <p id="val-winrate" class="text-2xl font-bold text-green-400 mt-1">0%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-md">
                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">Max Profit / Loss</p>
                <p id="val-maxmin" class="text-2xl font-bold text-white mt-1">0% / 0%</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-md">
                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">Total Modal (10Jt/Trade)</p>
                <p id="val-modal" class="text-2xl font-bold text-blue-400 mt-1">Rp 0</p>
            </div>
            <div class="bg-gray-800 p-4 rounded-lg border border-gray-700 shadow-md">
                <p class="text-xs text-gray-400 font-bold uppercase tracking-wider">Total Saldo Simulasi</p>
                <p id="val-saldo" class="text-2xl font-bold text-yellow-400 mt-1">Rp 0</p>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-xl overflow-hidden">
            <div class="overflow-x-auto max-h-[700px]">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="bg-gray-700 text-gray-300 sticky top-0 z-10 shadow-md">
                        <tr>
                            <th class="p-3 border-b border-gray-600">Emiten</th>
                            <th class="p-3 border-b border-gray-600">Tgl Buy</th>
                            <th class="p-3 border-b border-gray-600">Harga Beli</th>
                            <th class="p-3 border-b border-gray-600">Tgl Sell</th>
                            <th class="p-3 border-b border-gray-600">Harga Jual/Live</th>
                            <th class="p-3 border-b border-gray-600">P/L (%)</th>
                            <th class="p-3 border-b border-gray-600 text-center">Days</th>
                            <th class="p-3 border-b border-gray-600 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            Papa.parse("portofolio_web.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let tableHTML = "";
                    let data = results.data;
                    
                    // Kalkulasi Metrik Winrate
                    let closedTrades = data.filter(r => r.STATUS === "CLOSE");
                    let winCount = closedTrades.filter(r => parseFloat(r.PL_PCT) > 0).length;
                    let winrate = closedTrades.length > 0 ? ((winCount / closedTrades.length) * 100).toFixed(1) : 0;
                    
                    // Kalkulasi Profit & Loss Terbesar
                    let allPl = data.map(r => parseFloat(r.PL_PCT)).filter(n => !isNaN(n));
                    let maxProfit = allPl.length > 0 ? Math.max(...allPl).toFixed(1) : 0;
                    let maxLoss = allPl.length > 0 ? Math.min(...allPl).toFixed(1) : 0;

                    // Simulasi 10 Juta/Trade
                    let modalPerTrade = 10000000;
                    let totalModal = data.length * modalPerTrade;
                    let totalPnL = data.reduce((acc, r) => {
                        let pl = parseFloat(r.PL_PCT) || 0;
                        return acc + (modalPerTrade * (pl / 100));
                    }, 0);
                    let totalSaldo = totalModal + totalPnL;

                    let formatRp = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 });

                    // Update Kartu
                    document.getElementById('val-winrate').innerText = `${winrate}%`;
                    document.getElementById('val-maxmin').innerHTML = `<span class="text-green-400">+${maxProfit}%</span> / <span class="text-red-400">${maxLoss}%</span>`;
                    document.getElementById('val-modal').innerText = formatRp.format(totalModal);
                    document.getElementById('val-saldo').innerText = formatRp.format(totalSaldo);

                    // Render Tabel
                    data.forEach(row => {
                        let statusBadge = "";
                        if(row.STATUS === "OPEN") statusBadge = `<span class="bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold">OPEN</span>`;
                        else if(row.STATUS === "HOLD") statusBadge = `<span class="bg-yellow-500 text-black px-2 py-1 rounded text-xs font-bold">HOLD</span>`;
                        else if(row.STATUS === "CLOSE") statusBadge = `<span class="bg-gray-600 text-white px-2 py-1 rounded text-xs font-bold">CLOSE</span>`;

                        let plColor = parseFloat(row.PL_PCT) > 0 ? "text-green-400" : (parseFloat(row.PL_PCT) < 0 ? "text-red-400" : "text-gray-400");
                        let plText = parseFloat(row.PL_PCT) > 0 ? `+${row.PL_PCT}%` : `${row.PL_PCT}%`;
                        let hargaSellText = row.HARGA_SELL !== "0" ? `Rp ${row.HARGA_SELL}` : "-";

                        tableHTML += `
                            <tr class="hover:bg-gray-750 border-b border-gray-700 transition-colors">
                                <td class="p-3 font-bold text-white">${row.EMITEN}</td>
                                <td class="p-3 text-gray-400">${row.TGL_BUY}</td>
                                <td class="p-3">Rp ${row.HARGA_BUY}</td>
                                <td class="p-3 text-gray-400">${row.TGL_SELL}</td>
                                <td class="p-3">${hargaSellText}</td>
                                <td class="p-3 font-mono font-bold ${plColor}">${plText}</td>
                                <td class="p-3 text-center">${row.DAYS}</td>
                                <td class="p-3 text-center">${statusBadge}</td>
                            </tr>
                        `;
                    });

                    document.getElementById('table-body').innerHTML = tableHTML;
                }
            });
        });
    </script>
</body>
</html>
