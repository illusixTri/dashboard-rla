<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Winrate V2 Illusix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>
</head>
<body class="bg-gray-900 text-white font-sans antialiased p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex items-center justify-between border-b border-gray-700 pb-4">
            <div>
                <h1 class="text-3xl font-bold text-blue-400">🤖 Botaxx V2 Tracker</h1>
                <p class="text-gray-400 mt-1">Live Winrate & Performance Dashboard</p>
            </div>
            <div class="text-right">
                <p class="text-sm text-gray-400">Status Sistem</p>
                <p class="text-green-400 font-semibold flex items-center justify-end">
                    <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span> ONLINE
                </p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm font-semibold uppercase">Winrate Sinyal</h3>
                <p id="val-winrate" class="text-4xl font-bold text-green-400 mt-2">0%</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm font-semibold uppercase">Total Sinyal BUY</h3>
                <p id="val-buy" class="text-4xl font-bold text-blue-400 mt-2">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm font-semibold uppercase">Sukses TP</h3>
                <p id="val-tp" class="text-4xl font-bold text-yellow-400 mt-2">0</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 shadow-lg">
                <h3 class="text-gray-400 text-sm font-semibold uppercase">Avg. Profit TP</h3>
                <p id="val-profit" class="text-4xl font-bold text-purple-400 mt-2">0%</p>
            </div>
        </div>

        <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-lg overflow-hidden">
            <div class="p-4 border-b border-gray-700 bg-gray-850">
                <h2 class="text-lg font-semibold">Riwayat Sinyal Terbaru</h2>
            </div>
            <div class="overflow-x-auto h-96">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-700 text-gray-300 sticky top-0">
                        <tr>
                            <th class="p-3 border-b border-gray-600">Waktu (WIB)</th>
                            <th class="p-3 border-b border-gray-600">Tipe</th>
                            <th class="p-3 border-b border-gray-600">Emiten</th>
                            <th class="p-3 border-b border-gray-600">Harga Entry</th>
                            <th class="p-3 border-b border-gray-600">Profit (%)</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const csvUrl = "V2openclose.csv"; 

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    let buySet = new Set();
                    let tpSet = new Set();
                    let totalProfit = 0;
                    let tpCount = 0;
                    let tableHTML = "";

                    data.forEach(row => {
                        if(!row.TIPE || !row.EMITEN) return;
                        if(row.TIPE === 'BUY') {
                            buySet.add(row.EMITEN);
                        } else if(row.TIPE === 'TP') {
                            tpSet.add(row.EMITEN);
                            let profit = parseFloat(row.PROFIT_PCT);
                            if(!isNaN(profit)) {
                                totalProfit += profit;
                                tpCount++;
                            }
                        }

                        let badgeClass = row.TIPE === 'BUY' ? 'bg-blue-600 text-white' : 'bg-green-600 text-white';
                        let profitText = (row.PROFIT_PCT && row.PROFIT_PCT !== "0.0") ? `+${row.PROFIT_PCT}%` : "-";
                        
                        tableHTML += `
                            <tr class="hover:bg-gray-700 border-b border-gray-700">
                                <td class="p-3">${row.WAKTU_WIB}</td>
                                <td class="p-3"><span class="px-2 py-1 text-xs font-bold rounded ${badgeClass}">${row.TIPE}</span></td>
                                <td class="p-3 font-bold">${row.EMITEN}</td>
                                <td class="p-3">Rp ${row.HARGA_ENTRY}</td>
                                <td class="p-3 font-mono text-green-400">${profitText}</td>
                            </tr>
                        `;
                    });

                    let totalBuyEmiten = buySet.size;
                    let suksesTP = 0;
                    buySet.forEach(emiten => {
                        if(tpSet.has(emiten)) suksesTP++;
                    });

                    let winrate = totalBuyEmiten > 0 ? ((suksesTP / totalBuyEmiten) * 100).toFixed(1) : 0;
                    let avgProfit = tpCount > 0 ? (totalProfit / tpCount).toFixed(1) : 0;

                    document.getElementById('val-winrate').innerText = `${winrate}%`;
                    document.getElementById('val-buy').innerText = data.filter(r => r.TIPE === 'BUY').length;
                    document.getElementById('val-tp').innerText = tpCount;
                    document.getElementById('val-profit').innerText = `+${avgProfit}%`;
                    document.getElementById('table-body').innerHTML = tableHTML;
                }
            });
        });
    </script>
</body>
</html>
